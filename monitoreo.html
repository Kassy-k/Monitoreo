<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoreo de Entregas</title>
<style>
  :root {
    --bg:#f7f6f2;--surface:#ffffff;--surface2:#f1efe8;--border:rgba(0,0,0,0.1);
    --border2:rgba(0,0,0,0.07);--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
    --accent:#0f6e56;--accent-bg:#e1f5ee;--shadow:0 1px 3px rgba(0,0,0,0.06);
  }
  [data-theme="dark"] {
    --bg:#141412;--surface:#1e1e1b;--surface2:#252522;--border:rgba(255,255,255,0.1);
    --border2:rgba(255,255,255,0.06);--text:#f0ede6;--text2:#b4b2a9;--text3:#888780;
    --accent:#5dcaa5;--accent-bg:#04342c;--shadow:0 1px 3px rgba(0,0,0,0.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.2s,color 0.2s;}
  header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
  .header-left{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:32px;height:32px;background:var(--accent-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  header h1{font-size:16px;font-weight:500;letter-spacing:-0.01em;}
  .header-right{display:flex;align-items:center;gap:10px;}
  #ultima-act{font-size:12px;color:var(--text3);}
  .btn-theme{width:34px;height:34px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);transition:background 0.15s;}
  .btn-theme:hover{background:var(--border);}
  .controles{background:var(--surface);border-bottom:0.5px solid var(--border2);padding:0.65rem 1.5rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  input[type="text"],select,input[type="date"]{height:32px;border:0.5px solid var(--border);border-radius:7px;padding:0 10px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s;}
  input[type="text"]:focus,select:focus,input[type="date"]:focus{border-color:var(--accent);}
  input[type="text"]{min-width:160px;flex:1;}
  select{cursor:pointer;}
  .ctrl-group{display:flex;align-items:center;gap:6px;}
  .ctrl-label{font-size:12px;color:var(--text3);white-space:nowrap;}
  .btn{height:32px;padding:0 12px;border:0.5px solid var(--border);border-radius:7px;background:var(--surface2);font-size:13px;cursor:pointer;color:var(--text2);transition:background 0.15s,color 0.15s;white-space:nowrap;}
  .btn:hover{background:var(--border);color:var(--text);}
  .btn-primary{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:500;}
  .spacer{flex:1;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;padding:1rem 1.5rem;}
  .stat{background:var(--surface);border:0.5px solid var(--border2);border-radius:10px;padding:0.85rem 1rem;}
  .stat .val{font-size:22px;font-weight:500;line-height:1;margin-bottom:4px;}
  .stat .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;}
  .s-total .val{color:var(--text);}
  .s-ok .val{color:#0f6e56;} .s-rej .val{color:#993c1d;} .s-rep .val{color:#ba7517;} .s-no .val{color:#a32d2d;} .s-par .val{color:#3b6d11;}
  [data-theme="dark"] .s-ok .val{color:#5dcaa5;} [data-theme="dark"] .s-rej .val{color:#f0997b;} [data-theme="dark"] .s-rep .val{color:#ef9f27;} [data-theme="dark"] .s-no .val{color:#f09595;} [data-theme="dark"] .s-par .val{color:#97c459;}
  .tabla-wrap{padding:0 1.5rem 2rem;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:12px;overflow:hidden;border:0.5px solid var(--border2);font-size:13px;}
  thead{background:var(--surface2);}
  th{padding:9px 14px;text-align:left;font-weight:500;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;border-bottom:0.5px solid var(--border);white-space:nowrap;}
  td{padding:10px 14px;border-bottom:0.5px solid var(--border2);vertical-align:middle;color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  .pedido-num{font-weight:500;font-size:13px;font-family:'SF Mono','Fira Code',monospace;letter-spacing:0.02em;}
  .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
  .b-ok{background:#e1f5ee;color:#085041;} .b-rej{background:#faece7;color:#712b13;} .b-rep{background:#faeeda;color:#633806;} .b-par{background:#eaf3de;color:#27500a;} .b-no{background:#fcebeb;color:#791f1f;} .b-def{background:var(--surface2);color:var(--text2);}
  [data-theme="dark"] .b-ok{background:#04342c;color:#9fe1cb;} [data-theme="dark"] .b-rej{background:#4a1b0c;color:#f5c4b3;} [data-theme="dark"] .b-rep{background:#412402;color:#fac775;} [data-theme="dark"] .b-par{background:#173404;color:#c0dd97;} [data-theme="dark"] .b-no{background:#501313;color:#f7c1c1;}
  .tienda-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border);white-space:nowrap;}
  #msg{text-align:center;padding:3rem 1.5rem;color:var(--text3);font-size:14px;}
  @media(max-width:640px){
    header{padding:0.75rem 1rem;} .controles{padding:0.65rem 1rem;} .stats{padding:0.75rem 1rem;} .tabla-wrap{padding:0 0.75rem 2rem;} input[type="text"]{min-width:120px;}
  }
  .btn-edit { height:34px; padding:0 12px; border:0.5px solid var(--border); border-radius:8px; background:var(--surface2); font-size:13px; cursor:pointer; color:var(--text2); transition:background 0.15s; }
  .btn-edit:hover { background:var(--border); }
  .btn-edit.activo { background:#e1f5ee; border-color:#0f6e56; color:#0f6e56; font-weight:500; }
  [data-theme="dark"] .btn-edit.activo { background:#04342c; border-color:#5dcaa5; color:#5dcaa5; }
  .btn-edit-fila { background:none; border:none; cursor:pointer; font-size:15px; padding:2px 6px; border-radius:6px; color:var(--text3); }
  .btn-edit-fila:hover { background:var(--surface2); color:var(--accent); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.visible { display:flex; }
  .modal { background:var(--surface); border-radius:16px; padding:1.5rem; width:90%; max-width:420px; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
  .modal h3 { font-size:15px; font-weight:500; margin-bottom:1rem; }
  .modal .pedido-tag { font-family:monospace; background:var(--surface2); padding:3px 8px; border-radius:6px; font-size:13px; margin-bottom:1rem; display:inline-block; }
  .modal label { display:block; font-size:12px; color:var(--text3); margin-bottom:4px; margin-top:12px; }
  .modal input, .modal select { width:100%; height:36px; border:0.5px solid var(--border); border-radius:8px; padding:0 10px; font-size:14px; background:var(--surface2); color:var(--text); outline:none; }
  .modal input:focus, .modal select:focus { border-color:var(--accent); }
  .modal-btns { display:flex; gap:8px; margin-top:1.25rem; }
  .modal-btns button { flex:1; height:38px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:500; }
  .btn-guardar { background:var(--accent); color:#fff; }
  .btn-guardar:hover { opacity:0.88; }
  .btn-cancelar { background:var(--surface2); color:var(--text2); border:0.5px solid var(--border) !important; }
  .guardando { opacity:0.6; pointer-events:none; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-icon">📦</div>
    <h1>Monitoreo de Entregas</h1>
  </div>
  <div class="header-right">
    <span id="ultima-act">Cargando...</span>
    <button class="btn-theme" id="btn-tema" onclick="toggleTema()">🌙</button>
    <button class="btn-edit" id="btn-edicion" onclick="toggleEdicion()">✏️ Editar</button>
  </div>
</header>
<div class="controles">
  <input type="text" id="buscar" placeholder="Buscar pedido, municipio..." oninput="filtrar()">
  <select id="filtro-tienda" onchange="filtrar()">
    <option value="">Todas las tiendas</option>
    <option value="PUEBLA">Puebla</option>
    <option value="POLANCO">Polanco</option>
    <option value="MIRAMONTES">Miramontes</option>
    <option value="ZARAGOZA">Zaragoza</option>
    <option value="SANTA FE">Santa Fe</option>
    <option value="GUSTAVO BAZ">Gustavo Baz</option>
    <option value="QUERÉTARO">Querétaro</option>
    <option value="INTERLOMAS">Interlomas</option>
    <option value="TOREO">Toreo</option>
    <option value="LA VIGA">La Viga</option>
    <option value="PERINORTE">Perinorte</option>
    <option value="STUDIO">Studio</option>
    <option value="METEPEC">Metepec</option>
    <option value="VENDEDORES">Vendedores (EM/FOR/EQ)</option>
  </select>
  <select id="filtro-estatus" onchange="filtrar()">
    <option value="">Todos los estatus</option>
    <option value="exitoso">Exitoso</option>
    <option value="entregado">Entregado</option>
    <option value="rechazado">Rechazado</option>
    <option value="reprogramado">Reprogramado</option>
    <option value="parcial">Parcial</option>
    <option value="no entregado">No entregado</option>
  </select>
  <div class="ctrl-group">
    <span class="ctrl-label">Fecha</span>
    <input type="date" id="filtro-fecha" onchange="filtrar()">
  </div>
  <button class="btn btn-primary" onclick="ponerHoy()">Hoy</button>
  <button class="btn" onclick="limpiarFecha()">Ver todo</button>
  <div class="spacer"></div>
  <button class="btn" onclick="cargarDatos()">↻ Actualizar</button>
</div>
<div class="stats">
  <div class="stat s-total"><div class="val" id="s-total">—</div><div class="lbl">Total</div></div>
  <div class="stat s-ok"><div class="val" id="s-ok">—</div><div class="lbl">Entregado</div></div>
  <div class="stat s-rej"><div class="val" id="s-rej">—</div><div class="lbl">Rechazado</div></div>
  <div class="stat s-rep"><div class="val" id="s-rep">—</div><div class="lbl">Reprogramado</div></div>
  <div class="stat s-no"><div class="val" id="s-no">—</div><div class="lbl">No entregado</div></div>
  <div class="stat s-par"><div class="val" id="s-par">—</div><div class="lbl">Parcial</div></div>
</div>
<!-- Modal edición -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Editar pedido</h3>
    <span class="pedido-tag" id="modal-pedido"></span>
    <label>Hora reportada</label>
    <input type="text" id="modal-hora" placeholder="ej. 14:35">
    <label>Estatus</label>
    <select id="modal-estatus">
      <option value="Exitoso">Exitoso</option>
      <option value="Entregado">Entregado</option>
      <option value="Rechazado">Rechazado</option>
      <option value="Reprogramado">Reprogramado</option>
      <option value="Parcial">Parcial</option>
      <option value="No entregado">No entregado</option>
    </select>
    <label>Sub estatus</label>
    <input type="text" id="modal-subest" placeholder="ej. Cliente ausente">
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" id="btn-guardar" onclick="guardarCambios()">Guardar</button>
    </div>
  </div>
</div>

<div class="tabla-wrap">
  <div id="msg">Conectando...</div>
  <table id="tabla" style="display:none;">
    <thead>
      <tr>
        <th>Pedido</th><th>Tienda</th><th>Fecha</th><th>Municipio</th><th>Hora</th><th>Estatus</th><th>Sub estatus</th>
        <th id="col-editar" style="display:none;"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<script>
var URL_API = 'https://monitoreo.nr3551642.workers.dev/';
var URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbxxxOBuYI9_t4jIdFo9pWAsdHDqk1D-VzmYjh5-TRyArP9MQDcOGPuZy21LIH3oU7ZA/exec';
var PASS = 'KasselMonitoreo';
var modoEdicion = false;
var datos = [];

var TIENDAS = {
  'DECOSFE':'SANTA FE','DECOINT':'INTERLOMAS','DECOZAR':'ZARAGOZA',
  'DECOPOL':'POLANCO','DECOTOREO':'TOREO','DECOMIR':'MIRAMONTES',
  'PUE':'PUEBLA','OPU':'PUEBLA','POL':'POLANCO','OPO':'POLANCO',
  'MIR':'MIRAMONTES','OMI':'MIRAMONTES','ZAR':'ZARAGOZA','OZA':'ZARAGOZA',
  'SFE':'SANTA FE','OSF':'SANTA FE','KGB':'GUSTAVO BAZ','GOU':'GUSTAVO BAZ',
  'QRO':'QUERÉTARO','OQR':'QUERÉTARO','INT':'INTERLOMAS','OIN':'INTERLOMAS',
  'TOR':'TOREO','OTO':'TOREO','LVI':'LA VIGA','OLV':'LA VIGA',
  'KOU':'PERINORTE','KPE':'PERINORTE','STU':'STUDIO','CD':'STUDIO',
  'MET':'METEPEC','OME':'METEPEC','ET':'METEPEC',
  'EM':'VENDEDORES','FOR':'VENDEDORES','EQ':'VENDEDORES'
};

function tiendaDe(pedido) {
  if (!pedido) return 'OTRA';
  var p = pedido.toUpperCase().trim();
  var keys = Object.keys(TIENDAS).sort(function(a,b){return b.length-a.length;});
  for (var i=0;i<keys.length;i++) { if (p.indexOf(keys[i])===0) return TIENDAS[keys[i]]; }
  return 'OTRA';
}

function normFecha(f) {
  if (!f || !String(f).trim()) return '';
  var d = new Date(String(f).trim());
  if (!isNaN(d.getTime())) {
    var mx = new Date(d.getTime() + (-6*3600000) + d.getTimezoneOffset()*60000);
    return mx.getFullYear()+'-'+String(mx.getMonth()+1).padStart(2,'0')+'-'+String(mx.getDate()).padStart(2,'0');
  }
  var sl = String(f).toLowerCase().trim();
  var m1 = sl.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m1) { var y=m1[3]; if(y.length===2)y='20'+y; return y+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0'); }
  var MES={enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  var m2=sl.match(/^(\d{1,2})[-\s]([a-z]+)$/);
  if (m2&&MES[m2[2]]) return new Date().getFullYear()+'-'+String(MES[m2[2]]).padStart(2,'0')+'-'+m2[1].padStart(2,'0');
  return '';
}

function hoy() {
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function ponerHoy() { document.getElementById('filtro-fecha').value=hoy(); filtrar(); }
function limpiarFecha() { document.getElementById('filtro-fecha').value=''; filtrar(); }

function badgeCls(e) {
  var s=(e||'').toLowerCase();
  if(s.indexOf('exitoso')>=0||s==='entregado') return 'b-ok';
  if(s.indexOf('rechazado')>=0) return 'b-rej';
  if(s.indexOf('reprogramado')>=0) return 'b-rep';
  if(s.indexOf('parcial')>=0) return 'b-par';
  if(s.indexOf('no entregado')>=0) return 'b-no';
  return 'b-def';
}

function fmtFecha(f) {
  var d=new Date(f);
  if(!isNaN(d.getTime())) return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
  return f||'—';
}

function filtrar() {
  var q=document.getElementById('buscar').value.toLowerCase();
  var tienda=document.getElementById('filtro-tienda').value;
  var est=document.getElementById('filtro-estatus').value.toLowerCase();
  var fecha=document.getElementById('filtro-fecha').value;
  var res=datos.filter(function(r){
    var mt=!q||[r.pedido,r.muni,r.subest].some(function(v){return (v||'').toLowerCase().indexOf(q)>=0;});
    var mti=!tienda||r.tienda===tienda;
    var me=!est||(r.estatus||'').toLowerCase().indexOf(est)>=0;
    var mf=!fecha||normFecha(r.fecha)===fecha;
    return mt&&mti&&me&&mf;
  });
  var ok=res.filter(function(r){var e=(r.estatus||'').toLowerCase();return e.indexOf('exitoso')>=0||e==='entregado';}).length;
  var rej=res.filter(function(r){return (r.estatus||'').toLowerCase().indexOf('rechazado')>=0;}).length;
  var rep=res.filter(function(r){return (r.estatus||'').toLowerCase().indexOf('reprogramado')>=0;}).length;
  var par=res.filter(function(r){return (r.estatus||'').toLowerCase().indexOf('parcial')>=0;}).length;
  var no=res.filter(function(r){return (r.estatus||'').toLowerCase().indexOf('no entregado')>=0;}).length;
  document.getElementById('s-total').textContent=res.length;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-rej').textContent=rej;
  document.getElementById('s-rep').textContent=rep;
  document.getElementById('s-par').textContent=par;
  document.getElementById('s-no').textContent=no;
  var msg=document.getElementById('msg');
  var tabla=document.getElementById('tabla');
  var tbody=document.getElementById('tbody');
  if(!res.length){tabla.style.display='none';msg.style.display='block';msg.textContent='No se encontraron resultados.';return;}
  msg.style.display='none';
  tabla.style.display='table';
  tbody.innerHTML=res.map(function(r){
    return '<tr><td><span class="pedido-num">'+(r.pedido||'—')+'</span></td><td><span class="tienda-tag">'+(r.tienda||'—')+'</span></td><td style="color:var(--text3);font-size:12px;">'+fmtFecha(r.fecha)+'</td><td>'+(r.muni||'—')+'</td><td style="color:var(--text2);">'+(r.hora||'—')+'</td><td><span class="badge '+badgeCls(r.estatus)+'">'+(r.estatus||'—')+'</span></td><td style="color:var(--text2);font-size:12px;">'+(r.subest||'—')+'</td>'+(modoEdicion?'<td><button class="btn-edit-fila" onclick="abrirModal('+JSON.stringify(r)+')">✏️</button></td>':'<td style="display:none;"></td>')+'</tr>';
  }).join('');
}

function recibirDatos(raw) {
  try {
    datos=raw.filter(function(r){return r.pedido&&r.pedido.trim();}).map(function(r){r.tienda=tiendaDe(r.pedido);return r;});
    filtrar();
    document.getElementById('ultima-act').textContent='Actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('msg').textContent='⚠️ Error al procesar datos.';
    document.getElementById('ultima-act').textContent='Error';
  }
}

function cargarDatos() {
  document.getElementById('msg').textContent='Actualizando...';
  document.getElementById('msg').style.display='block';
  document.getElementById('tabla').style.display='none';
  document.getElementById('ultima-act').textContent='Actualizando...';
  fetch(URL_API+'?t='+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(raw){
      datos=raw.filter(function(r){return r.pedido&&r.pedido.trim();}).map(function(r){r.tienda=tiendaDe(r.pedido);return r;});
      filtrar();
      document.getElementById('ultima-act').textContent='Actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    })
    .catch(function(){
      document.getElementById('msg').textContent='⚠️ No se pudo conectar.';
      document.getElementById('ultima-act').textContent='Error';
    });
}

function toggleTema(){
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'':'dark');
  document.getElementById('btn-tema').textContent=dark?'🌙':'☀️';
  try{localStorage.setItem('tema',dark?'light':'dark');}catch(e){}
}

window.onload=function(){
  try{
    var t=localStorage.getItem('tema')||'light';
    document.documentElement.setAttribute('data-theme',t);
    document.getElementById('btn-tema').textContent=t==='dark'?'☀️':'🌙';
  }catch(e){}
  document.getElementById('filtro-fecha').value=hoy();
  cargarDatos();
};

setInterval(cargarDatos,5*60*1000);

var filaActual = null;

function toggleEdicion() {
  if (!modoEdicion) {
    var pw = prompt('Contraseña:');
    if (pw !== PASS) { alert('Contraseña incorrecta'); return; }
    modoEdicion = true;
    document.getElementById('btn-edicion').classList.add('activo');
    document.getElementById('btn-edicion').textContent = '🔒 Salir de edición';
    document.getElementById('col-editar').style.display = '';
  } else {
    modoEdicion = false;
    document.getElementById('btn-edicion').classList.remove('activo');
    document.getElementById('btn-edicion').textContent = '✏️ Editar';
    document.getElementById('col-editar').style.display = 'none';
  }
  filtrar();
}

function abrirModal(r) {
  filaActual = r;
  document.getElementById('modal-pedido').textContent = r.pedido;
  document.getElementById('modal-hora').value = r.hora || '';
  document.getElementById('modal-estatus').value = r.estatus || 'Exitoso';
  document.getElementById('modal-subest').value = r.subest || '';
  document.getElementById('modal-overlay').classList.add('visible');
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
  filaActual = null;
}

function guardarCambios() {
  if (!filaActual) return;
  var hora   = document.getElementById('modal-hora').value.trim();
  var estatus= document.getElementById('modal-estatus').value;
  var subest = document.getElementById('modal-subest').value.trim();
  var btn    = document.getElementById('btn-guardar');
  btn.textContent = 'Guardando...';
  btn.classList.add('guardando');

  var url = URL_SCRIPT + '?accion=actualizar&fila=' + filaActual.fila +
    '&hora=' + encodeURIComponent(hora) +
    '&estatus=' + encodeURIComponent(estatus) +
    '&subest=' + encodeURIComponent(subest);

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res.ok) {
        // Actualizar dato local
        var idx = datos.findIndex(function(d){ return d.fila === filaActual.fila; });
        if (idx >= 0) { datos[idx].hora=hora; datos[idx].estatus=estatus; datos[idx].subest=subest; }
        cerrarModal();
        filtrar();
      } else {
        alert('Error al guardar: ' + (res.msg||''));
      }
    })
    .catch(function(){ alert('Error de conexión al guardar.'); })
    .finally(function(){
      btn.textContent = 'Guardar';
      btn.classList.remove('guardando');
    });
}

// Cerrar modal al tocar fuera
document.getElementById('modal-overlay').addEventListener('click', function(e){
  if (e.target === this) cerrarModal();
});
</script>
</body>
</html>
